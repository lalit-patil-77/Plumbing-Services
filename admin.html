<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>PlumbPro Admin | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0a0f1e] text-white p-6">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-bold neon-text-blue uppercase italic text-blue-500">Admin Panel</h1>
            <div class="flex gap-4">
                <button onclick="clearAllData()" class="border border-red-500 text-red-500 px-4 py-2 rounded-lg text-xs hover:bg-red-500 hover:text-white transition">Clear Data</button>
                <a href="index.html" class="bg-gray-800 px-6 py-2 rounded-lg text-xs font-bold">Back to Site</a>
            </div>
        </div>

        <div class="bg-[#11162d] border border-gray-800 rounded-3xl p-8 mb-10 shadow-xl">
            <h2 class="text-xl font-bold mb-6 text-purple-400 italic underline">New booking</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b border-gray-800 text-gray-500 uppercase text-xs">
                            <th class="p-4">Sr.No</th>
                            <th class="p-4">Customer</th>
                            <th class="p-4">Mobile</th>
                            <th class="p-4">Address</th>
                            <th class="p-4">Plumber</th>
                        </tr>
                    </thead>
                    <tbody id="bookingTable"></tbody>
                </table>
            </div>
        </div>

        <div class="bg-[#11162d] border border-gray-800 rounded-3xl p-8 shadow-xl">
            <h2 class="text-xl font-bold mb-6 text-blue-400 italic underline">Plumber Status Management</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="plumberGrid"></div>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
